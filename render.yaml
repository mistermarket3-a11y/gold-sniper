services:
  - type: web
    name: gold-sniper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn GOLD_SNIPER:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PUBLIC_SERVER_URL
        sync: false          # es. https://gold-sniper.onrender.com
      - key: MASTER_KEY
        generateValue: true
